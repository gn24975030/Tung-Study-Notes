<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Tung Study Notes</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- 改用 Dark 主題 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <style>
    /* 微調一下深色模式下的連結顏色，避免太暗看不清楚 */
    :root {
      --theme-color: #42b983;
    }
    /* 讓程式碼區塊在深色模式下更明顯 */
    pre {
      background-color: #1e1e1e !important;
    }
  </style>
</head>
<body>
  <div id="app">筆記載入中...</div>
  
  <script>
    window.$docsify = {
      name: 'Tung Study Notes 📚',
      repo: 'gn24975030/Tung-Study-Notes',
      loadSidebar: false,
      homepage: 'readme.md',
      executeScript: true, // 允許執行 Markdown 內的 JavaScript
      // 搜尋功能設定 (選用，讓深色模式下更好用)
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜尋筆記...',
        noData: '找不到結果!',
      }
    }
  </script>
  
  <!-- Docsify 核心 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- 搜尋外掛 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- Script 執行外掛 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/external-script.min.js"></script>
</body>
</html>
